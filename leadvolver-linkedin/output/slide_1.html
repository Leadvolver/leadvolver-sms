<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 1 - LeadVolver</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #000;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    background: #080808;
    position: relative;
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
  }

  /* Background texture */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* Ambient glow blobs */
  .glow-blob-1 {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 80, 30, 0.12) 0%, transparent 70%);
    top: -100px;
    right: -80px;
    z-index: 0;
  }

  .glow-blob-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 140, 0, 0.08) 0%, transparent 70%);
    bottom: -80px;
    left: -60px;
    z-index: 0;
  }

  .glow-blob-3 {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 60, 0, 0.06) 0%, transparent 70%);
    top: 400px;
    left: 200px;
    z-index: 0;
  }

  /* Slide counter */
  .slide-counter {
    position: absolute;
    top: 44px;
    right: 52px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #444;
    letter-spacing: 0.08em;
    z-index: 10;
  }

  /* Brand */
  .brand {
    position: absolute;
    bottom: 44px;
    left: 52px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #383838;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 10;
  }

  /* Top accent line */
  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, #ff4500 30%, #ff8c00 70%, transparent 100%);
    z-index: 10;
  }

  /* Main content area */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 80px 72px 80px 72px;
    z-index: 5;
  }

  /* Tag / label */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 69, 0, 0.12);
    border: 1px solid rgba(255, 69, 0, 0.35);
    border-radius: 4px;
    padding: 6px 14px;
    margin-bottom: 36px;
  }

  .tag-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ff4500;
    box-shadow: 0 0 6px #ff4500;
  }

  .tag-text {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #ff6b35;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* Headline */
  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px;
    line-height: 0.95;
    letter-spacing: 0.01em;
    color: #ffffff;
    margin-bottom: 36px;
    max-width: 620px;
  }

  .headline .highlight-word {
    position: relative;
    display: inline-block;
    color: transparent;
    -webkit-text-stroke: 2px rgba(255, 255, 255, 0.15);
  }

  .headline .highlight-word::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    background: linear-gradient(135deg, #ff4500 0%, #ff8c00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Body text */
  .body-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: #888;
    line-height: 1.6;
    max-width: 480px;
    margin-bottom: 52px;
  }

  .body-text strong {
    color: #bbb;
    font-weight: 600;
  }

  /* Stat badge */
  .stat-badge {
    display: flex;
    align-items: center;
    gap: 0;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 0;
    overflow: hidden;
  }

  .stat-item {
    padding: 20px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
  }

  .stat-item:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 20%;
    bottom: 20%;
    width: 1px;
    background: rgba(255,255,255,0.08);
  }

  .stat-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 46px;
    line-height: 1;
    background: linear-gradient(135deg, #ff4500 0%, #ff8c00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    max-width: 100px;
  }

  /* Right side visual element */
  .visual-panel {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 420px;
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 40px;
    gap: 16px;
  }

  /* CRM card mockup */
  .crm-card {
    width: 320px;
    background: rgba(14, 14, 14, 0.95);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  }

  .crm-header {
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .crm-dots {
    display: flex;
    gap: 6px;
  }

  .crm-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .crm-dot.red { background: #ff5f57; }
  .crm-dot.yellow { background: #febc2e; }
  .crm-dot.green { background: #28c840; }

  .crm-title {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #444;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-left: 6px;
  }

  .crm-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .lead-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }

  .lead-row.dead {
    opacity: 0.5;
  }

  .lead-row.dead::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 6px,
      rgba(255,69,0,0.03) 6px,
      rgba(255,69,0,0.03) 7px
    );
  }

  .lead-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family
