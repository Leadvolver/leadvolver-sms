<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 2 - Dead Leads</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'Space Grotesk', sans-serif;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: #0a0a0a;
    overflow: hidden;
  }

  /* Background elements */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .bg-glow-red {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(220,38,38,0.15) 0%, transparent 70%);
  }

  .bg-glow-bottom {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 600px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(220,38,38,0.08) 0%, transparent 70%);
  }

  /* Slide counter */
  .slide-counter {
    position: absolute;
    top: 40px;
    right: 48px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #444;
    letter-spacing: 2px;
    z-index: 10;
  }

  /* Brand */
  .brand {
    position: absolute;
    bottom: 36px;
    left: 48px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #3a3a3a;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 10;
  }

  /* Left content */
  .left-content {
    position: absolute;
    left: 48px;
    top: 80px;
    width: 480px;
    z-index: 5;
  }

  .pill-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(220,38,38,0.12);
    border: 1px solid rgba(220,38,38,0.3);
    border-radius: 100px;
    padding: 6px 16px;
    margin-bottom: 28px;
  }

  .pill-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #dc2626;
    box-shadow: 0 0 6px #dc2626;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .pill-text {
    font-size: 11px;
    font-weight: 600;
    color: #ef4444;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 74px;
    line-height: 0.92;
    color: #ffffff;
    letter-spacing: 1px;
    margin-bottom: 28px;
  }

  .headline span {
    color: #dc2626;
    display: block;
  }

  .body-text {
    font-size: 17px;
    line-height: 1.65;
    color: #9ca3af;
    font-weight: 400;
    max-width: 420px;
    margin-bottom: 36px;
  }

  .body-text strong {
    color: #d1d5db;
    font-weight: 600;
  }

  /* Stat row */
  .stat-row {
    display: flex;
    gap: 20px;
    margin-top: 8px;
  }

  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px 20px;
    flex: 1;
  }

  .stat-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    color: #dc2626;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: #6b7280;
    font-weight: 500;
    letter-spacing: 0.5px;
    line-height: 1.4;
  }

  /* CRM Dashboard Mockup */
  .crm-mockup {
    position: absolute;
    right: 40px;
    top: 80px;
    width: 470px;
    z-index: 5;
  }

  /* Browser chrome */
  .browser-chrome {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 14px 14px 0 0;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #222;
  }

  .browser-dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .dot-red { background: #ef4444; }
  .dot-yellow { background: #f59e0b; }
  .dot-green { background: #22c55e; }

  .browser-bar {
    flex: 1;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 11px;
    color: #4b5563;
    font-family: 'Inter', monospace;
  }

  /* Dashboard body */
  .dashboard-body {
    background: #111111;
    border: 1px solid #1f1f1f;
    border-top: none;
    border-radius: 0 0 14px 14px;
    padding: 16px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
  }

  .db-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .db-title {
    font-size: 13px;
    font-weight: 700;
    color: #e5e7eb;
    letter-spacing: 0.5px;
  }

  .db-badge {
    background: rgba(220,38,38,0.15);
    border: 1px solid rgba(220,38,38,0.25);
    color: #ef4444;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 1px;
  }

  /* Lead rows */
  .lead-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    position: relative;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    transition: all 0.3s;
  }

  .lead-row.dead {
    background: rgba(220,38,38,0.05);
    border-color: rgba(220,38,38,0.15);
  }

  .lead-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .lead-info {
    flex: 1;
  }

  .lead-name {
    font-size: 12px;
    font-weight: 600;
    color: #d1d5db;
    margin-bottom: 2px;
  }

  .lead-detail {
    font-size: 10px;
    color: #4b5563;
  }

  .lead-status {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .status-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 100px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .status-dead {
    background: rgba(220,38,38,0.15);
    color: #ef4444;
    border: 1px solid rgba(220,38,38,0.2);
  }

  .status-cold {
    background: rgba(99,102,241,0.12);
    color: #818cf8;
    border: 1px solid rgba(99,102,241,0.2);
  }

  .status-warn {
    background: rgba(245,158,11,0.12);
    color: #f59e0b;
    border: 1px solid rgba(245,158,11,0.2);
  }

  .days-ago {
    font-size: 9px;
    color: #4b5563;
  }

  /* Time wasted bar */
  .time-bar-section {
    margin-top: 14px;
    padding: 12px;
    background: rgba(220,38,38,0.06);
    border: 1px solid rgba(220,38,38,0.12);
    border-radius: 10px;
  }

  .time-bar-label {
    display: flex;
