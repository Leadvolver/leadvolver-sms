<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leadvolver - Slide 6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #000;
}

.canvas {
  width: 1080px;
  height: 1080px;
  background: #080808;
  position: relative;
  overflow: hidden;
  font-family: 'Space Grotesk', sans-serif;
}

/* Background elements */
.bg-gradient-radial {
  position: absolute;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 165, 0, 0.08) 0%, transparent 70%);
  top: -100px;
  left: -100px;
  pointer-events: none;
}

.bg-gradient-bottom {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 120, 0, 0.06) 0%, transparent 70%);
  bottom: -200px;
  right: -100px;
  pointer-events: none;
}

.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 54px 54px;
  pointer-events: none;
}

/* Slide counter */
.slide-counter {
  position: absolute;
  top: 44px;
  right: 52px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: #444;
  letter-spacing: 0.08em;
}

/* Brand bottom left */
.brand-label {
  position: absolute;
  bottom: 42px;
  left: 52px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 0.15em;
  color: #383838;
}

/* Main layout */
.main-content {
  position: absolute;
  top: 0;
  left: 0;
  width: 1080px;
  height: 1080px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 64px 80px 64px;
}

/* Top badge */
.top-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255, 140, 0, 0.12);
  border: 1px solid rgba(255, 140, 0, 0.3);
  border-radius: 100px;
  padding: 7px 18px;
  margin-bottom: 32px;
}

.badge-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #FF8C00;
  box-shadow: 0 0 8px rgba(255, 140, 0, 0.8);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.85); }
}

.badge-text {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: #FF8C00;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* Headline */
.headline {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 72px;
  letter-spacing: 0.04em;
  color: #FFFFFF;
  text-align: center;
  line-height: 1.0;
  margin-bottom: 10px;
}

.headline span {
  background: linear-gradient(135deg, #FF8C00, #FFC857);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Sub headline */
.sub-headline {
  font-family: 'Inter', sans-serif;
  font-size: 17px;
  font-weight: 400;
  color: #888;
  text-align: center;
  line-height: 1.6;
  margin-bottom: 44px;
  max-width: 600px;
}

/* CTA Card */
.cta-card {
  width: 720px;
  background: linear-gradient(145deg, #111111, #0d0d0d);
  border: 1px solid #222;
  border-radius: 24px;
  padding: 48px 52px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
}

.cta-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255, 140, 0, 0.5), transparent);
}

.cta-card-glow {
  position: absolute;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255, 140, 0, 0.07) 0%, transparent 70%);
  pointer-events: none;
}

/* Stats row inside card */
.stats-row {
  display: flex;
  gap: 16px;
  margin-bottom: 36px;
}

.stat-pill {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 18px 16px;
  text-align: center;
}

.stat-pill-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 40px;
  letter-spacing: 0.04em;
  background: linear-gradient(135deg, #FF8C00, #FFC857);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-pill-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: #555;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Divider */
.card-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  margin-bottom: 32px;
}

/* Two column layout in card */
.card-columns {
  display: flex;
  gap: 24px;
  margin-bottom: 36px;
}

/* Step items */
.step-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.step-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.step-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255, 140, 0, 0.15);
  border: 1px solid rgba(255, 140, 0, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.step-checkmark {
  width: 10px;
  height: 10px;
}

.step-text {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: #bbb;
  line-height: 1.5;
}

.step-text strong {
  color: #fff;
  font-weight: 600;
}

/* URL mockup in right column */
.url-mockup {
  width: 240px;
  flex-shrink: 0;
}

.browser-bar {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 10px 10px 0 0;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.browser-dots {
  display: flex;
  gap: 5px;
}

.browser-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.browser-dot-1 { background: #3a3a3a; }
.browser-dot-2 { background: #3a3a3a; }
.browser-dot-3 { background: #3a3a3a; }

.browser-url-bar {
  flex: 1;
  background: #111;
  border: 1px solid #222;
  border-radius: 5px;
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.lock-icon {
  width: 8px;
  height: 8px;
  border: 1.5px solid #555;
  border-radius: 2px;
  position: relative;
  flex-shrink: 0;
}

.lock-icon::before {
  content: '';
  position: absolute;
  width: 5px;
  height: 4px;
  border: 1.5px solid #555;
  border-radius: 2px 2px 0 0;
  border-bottom: none;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
}

.browser-url-text {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  color: #FF8C00;
  font-weight: 500;
}

.browser-body {
  background: #111;
  border: 1px solid #2a
