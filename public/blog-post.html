<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — LEADVOLVER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface1: #141414; --surface2: #1a1a1a;
      --border: #2a2a2a; --text: #ffffff; --text2: #a0a0a0; --text3: #666666;
      --accent: #b8f73e; --radius: 4px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 48px; border-bottom: 1px solid var(--border); }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.05em; }
    .nav-brand svg { color: var(--accent); }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { color: var(--text2); text-decoration: none; font-size: 14px; transition: color 0.15s; }
    .nav-links a:hover { color: var(--text); }
    .btn-app { background: var(--accent); color: #000; padding: 8px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity 0.15s; }
    .btn-app:hover { opacity: 0.85; color: #000; }

    .article-wrap { max-width: 720px; margin: 0 auto; padding: 64px 48px 100px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text3); text-decoration: none; font-size: 13px; margin-bottom: 40px; transition: color 0.15s; }
    .back-link:hover { color: var(--text2); }

    .article-meta { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text3); margin-bottom: 20px; }
    .meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text3); }

    h1 { font-family: 'Syne', sans-serif; font-size: clamp(28px, 4vw, 44px); font-weight: 800; line-height: 1.15; margin-bottom: 40px; }

    .article-body { color: #d0d0d0; }
    .article-body p { margin-bottom: 24px; font-size: 17px; line-height: 1.8; }
    .article-body p:last-child { margin-bottom: 0; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 48px 0; }

    .back-footer { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 600; }
    .back-footer:hover { opacity: 0.8; }

    .loading { text-align: center; padding: 80px 20px; color: var(--text3); font-size: 14px; }
    .error { text-align: center; padding: 80px 20px; color: var(--text3); }
    .error h2 { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 8px; }

    footer { border-top: 1px solid var(--border); padding: 28px 48px; text-align: center; color: var(--text3); font-size: 13px; }
    footer a { color: var(--text2); text-decoration: none; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.1 1.18 2 2 0 012.07 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
    </svg>
    LEADVOLVER
  </a>
  <div class="nav-links">
    <a href="/blog">Blog</a>
    <a href="/" class="btn-app">Open App</a>
  </div>
</nav>

<div class="article-wrap" id="content">
  <div class="loading">Loading...</div>
</div>

<footer>
  &copy; 2026 LEADVOLVER &mdash; <a href="/blog">All Posts</a>
</footer>

<script>
  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function renderContent(text) {
    return text.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  }

  async function loadPost() {
    const slug = location.pathname.replace('/blog/', '').replace(/\/$/, '');
    const content = document.getElementById('content');

    try {
      const res = await fetch(`/api/blog/${slug}`);
      if (!res.ok) throw new Error('not found');
      const post = await res.json();

      document.title = `${post.title} — LEADVOLVER`;

      content.innerHTML = `
        <a href="/blog" class="back-link">&larr; Back to Blog</a>
        <div class="article-meta">
          <span>${formatDate(post.created_at)}</span>
          <span class="meta-dot"></span>
          <span>${post.author}</span>
        </div>
        <h1>${post.title}</h1>
        <div class="article-body">${renderContent(post.content)}</div>
        <hr class="divider">
        <a href="/blog" class="back-footer">&larr; All Posts</a>
      `;
    } catch (e) {
      content.innerHTML = `
        <div class="error">
          <h2>Post not found</h2>
          <p><a href="/blog" style="color:var(--accent)">Back to Blog</a></p>
        </div>
      `;
    }
  }

  loadPost();
</script>
</body>
</html>
