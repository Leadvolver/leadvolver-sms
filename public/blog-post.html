<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — LEADVOLVER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8; --surface: #f4f4f1;
      --border: #e4e4e0; --border2: #d4d4d0;
      --text: #111110; --text2: #6b6b68; --text3: #a8a8a4;
      --green: #4a7c3f;
      --radius: 8px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 400; line-height: 1.65; -webkit-font-smoothing: antialiased; }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 62px;
      background: rgba(250,250,248,0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: 0.5px; color: var(--text); text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a { color: var(--text2); text-decoration: none; font-size: 13.5px; font-weight: 400; transition: color 0.15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .btn-dark { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 100px; font-size: 13.5px; font-weight: 500; text-decoration: none; color: #fff; background: var(--text); transition: background 0.15s; white-space: nowrap; }
    .btn-dark:hover { background: #2a2a28; }

    .article-wrap { max-width: 700px; margin: 0 auto; padding: 60px 48px 100px; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text3); text-decoration: none; font-size: 13px; font-weight: 400; margin-bottom: 44px; transition: color 0.15s; }
    .back-link:hover { color: var(--text2); }

    .article-meta { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text3); font-weight: 300; margin-bottom: 18px; }
    .meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text3); }

    h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: clamp(26px, 4vw, 40px); font-weight: 700; line-height: 1.15; letter-spacing: -0.3px; margin-bottom: 44px; }

    .article-body { color: var(--text2); }
    .article-body p { margin-bottom: 22px; font-size: 16px; font-weight: 300; line-height: 1.85; color: #3a3a38; }
    .article-body p:last-child { margin-bottom: 0; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 52px 0; }

    .back-footer { display: inline-flex; align-items: center; gap: 8px; color: var(--green); text-decoration: none; font-size: 14px; font-weight: 500; transition: opacity 0.15s; }
    .back-footer:hover { opacity: 0.75; }

    .error { text-align: center; padding: 80px 20px; color: var(--text3); }

    footer { border-top: 1px solid var(--border); padding: 24px 48px; text-align: center; color: var(--text3); font-size: 12.5px; font-weight: 300; background: #fff; }
    footer a { color: var(--text2); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      .article-wrap { padding: 40px 20px 80px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">LEADVOLVER</a>
  <ul class="nav-links">
    <li><a href="/#examples">Examples</a></li>
    <li><a href="/#how">How it works</a></li>
    <li><a href="/#pricing">Pricing</a></li>
    <li><a href="/blog" class="active">Blog</a></li>
  </ul>
  <a href="https://wa.me/31634319690?text=Hi%2C%20I%27d%20like%20to%20get%20started%20with%20LEADVOLVER" target="_blank" class="btn-dark">Get started →</a>
</nav>

<div class="article-wrap" id="content">
  <p style="color:var(--text3);text-align:center;padding:80px 0;font-weight:300">Loading...</p>
</div>

<footer>&copy; 2026 LEADVOLVER &nbsp;&middot;&nbsp; <a href="/blog">All Posts</a></footer>

<script>
  const SUPABASE_URL = 'https://qyfkmsnjrytduxxssjsk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5Zmttc25qcnl0ZHV4eHNzanNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxOTM2NzEsImV4cCI6MjA5Mjc2OTY3MX0.sYmCbrWNAJEIjoU90lUDGzRGGfQUKyAHw93PZupHxM8';

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function renderContent(text) {
    return text.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  }

  async function loadPost() {
    const slug = location.pathname.replace(/^\/blog\//, '').replace(/\/$/, '');
    const content = document.getElementById('content');
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/blogs?slug=eq.${encodeURIComponent(slug)}&published=eq.true`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );
      const data = await res.json();
      if (!data.length) throw new Error('not found');
      const post = data[0];
      document.title = `${post.title} — LEADVOLVER`;
      content.innerHTML = `
        <a href="/blog" class="back-link">&larr; Back to Blog</a>
        <div class="article-meta">
          <span>${formatDate(post.created_at)}</span>
          <span class="meta-dot"></span>
          <span>${post.author}</span>
        </div>
        <h1>${post.title}</h1>
        <div class="article-body">${renderContent(post.content)}</div>
        <hr class="divider">
        <a href="/blog" class="back-footer">&larr; All Posts</a>
      `;
    } catch (e) {
      content.innerHTML = `<div class="error"><h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700">Post not found</h2><p style="margin-top:12px;font-weight:300"><a href="/blog" style="color:var(--green)">Back to Blog</a></p></div>`;
    }
  }
  loadPost();
</script>
</body>
</html>
