<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — LEADVOLVER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface1: #141414; --surface2: #1a1a1a;
      --border: #2a2a2a; --text: #ffffff; --text2: #a0a0a0; --text3: #666666;
      --accent: #b8f73e; --radius: 4px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 48px; border-bottom: 1px solid var(--border); }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.05em; }
    .nav-brand svg { color: var(--accent); }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { color: var(--text2); text-decoration: none; font-size: 14px; transition: color 0.15s; }
    .nav-links a:hover { color: var(--text); }
    .btn-app { background: var(--accent); color: #000; padding: 8px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity 0.15s; }
    .btn-app:hover { opacity: 0.85; color: #000; }

    .hero { padding: 80px 48px 48px; max-width: 1100px; margin: 0 auto; }
    .hero-label { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; }
    .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(36px, 5vw, 56px); font-weight: 800; line-height: 1.1; }
    .hero p { color: var(--text2); font-size: 18px; margin-top: 16px; max-width: 520px; }

    .posts { max-width: 1100px; margin: 0 auto; padding: 0 48px 80px; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 8px; }
    .post-card { background: var(--surface1); border: 1px solid var(--border); border-radius: 8px; padding: 28px; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 12px; transition: border-color 0.2s, transform 0.15s; }
    .post-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .post-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text3); }
    .post-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text3); }
    .post-card h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; line-height: 1.3; }
    .post-card p { font-size: 14px; color: var(--text2); flex: 1; }
    .post-read { font-size: 13px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 6px; }

    .empty { text-align: center; padding: 80px 20px; color: var(--text3); }
    .empty p { font-size: 16px; margin-top: 8px; }

    .loading { text-align: center; padding: 80px 20px; color: var(--text3); font-size: 14px; }

    footer { border-top: 1px solid var(--border); padding: 28px 48px; text-align: center; color: var(--text3); font-size: 13px; }
    footer a { color: var(--text2); text-decoration: none; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.1 1.18 2 2 0 012.07 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
    </svg>
    LEADVOLVER
  </a>
  <div class="nav-links">
    <a href="/blog">Blog</a>
    <a href="/" class="btn-app">Open App</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-label">Blog</div>
  <h1>Insights on AI &<br>Lead Generation</h1>
  <p>Strategies, tips, and updates from the LEADVOLVER team.</p>
</div>

<div class="posts">
  <div id="posts-container" class="loading">Loading posts...</div>
</div>

<footer>
  &copy; 2026 LEADVOLVER &mdash; <a href="/">Back to App</a>
</footer>

<script>
  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  async function loadPosts() {
    const container = document.getElementById('posts-container');
    try {
      const res = await fetch('/api/blog');
      const posts = await res.json();

      if (!posts.length) {
        container.className = 'empty';
        container.innerHTML = '<h3>No posts yet</h3><p>Check back soon.</p>';
        return;
      }

      container.className = 'posts-grid';
      container.innerHTML = posts.map(p => `
        <a href="/blog/${p.slug}" class="post-card">
          <div class="post-meta">
            <span>${formatDate(p.created_at)}</span>
            <span class="post-meta-dot"></span>
            <span>${p.author}</span>
          </div>
          <h2>${p.title}</h2>
          ${p.excerpt ? `<p>${p.excerpt}</p>` : ''}
          <span class="post-read">Read post &rarr;</span>
        </a>
      `).join('');
    } catch (e) {
      container.className = 'empty';
      container.innerHTML = '<h3>Failed to load posts</h3><p>Please try again later.</p>';
    }
  }

  loadPosts();
</script>
</body>
</html>
