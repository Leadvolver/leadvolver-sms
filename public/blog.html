<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — LEADVOLVER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8; --surface: #f4f4f1; --surface2: #eeeeeb;
      --border: #e4e4e0; --border2: #d4d4d0;
      --text: #111110; --text2: #6b6b68; --text3: #a8a8a4;
      --green: #4a7c3f; --green-bg: #eef6eb;
      --radius: 8px; --radius-lg: 14px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 400; line-height: 1.65; -webkit-font-smoothing: antialiased; }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 62px;
      background: rgba(250,250,248,0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: 0.5px; color: var(--text); text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a { color: var(--text2); text-decoration: none; font-size: 13.5px; font-weight: 400; transition: color 0.15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .btn-dark { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 100px; font-size: 13.5px; font-weight: 500; text-decoration: none; color: #fff; background: var(--text); transition: background 0.15s; white-space: nowrap; }
    .btn-dark:hover { background: #2a2a28; }

    .hero { max-width: 1040px; margin: 0 auto; padding: 72px 48px 48px; }
    .section-label { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text2); background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 4px 12px; margin-bottom: 20px; }
    .hero h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: clamp(32px, 5vw, 52px); font-weight: 700; line-height: 1.1; letter-spacing: -0.3px; margin-bottom: 12px; }
    .hero p { color: var(--text2); font-size: 17px; font-weight: 300; max-width: 480px; }

    .posts { max-width: 1040px; margin: 0 auto; padding: 0 48px 96px; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; margin-top: 8px; }

    .post-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 26px; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 10px; transition: box-shadow 0.2s, border-color 0.2s; }
    .post-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.06); border-color: var(--border2); }

    .post-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text3); font-weight: 400; }
    .post-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text3); }
    .post-card h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 700; line-height: 1.3; letter-spacing: -0.2px; }
    .post-card p { font-size: 13.5px; font-weight: 300; color: var(--text2); flex: 1; line-height: 1.6; }
    .post-read { font-size: 13px; font-weight: 500; color: var(--green); margin-top: 4px; }

    .empty { text-align: center; padding: 80px 20px; color: var(--text3); }
    .empty p { font-size: 15px; margin-top: 8px; font-weight: 300; }

    footer { border-top: 1px solid var(--border); padding: 24px 48px; text-align: center; color: var(--text3); font-size: 12.5px; font-weight: 300; background: #fff; }
    footer a { color: var(--text2); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      .hero, .posts { padding-left: 20px; padding-right: 20px; }
      .hero { padding-top: 48px; }
      .posts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">LEADVOLVER</a>
  <ul class="nav-links">
    <li><a href="/#examples">Examples</a></li>
    <li><a href="/#how">How it works</a></li>
    <li><a href="/#pricing">Pricing</a></li>
    <li><a href="/blog" class="active">Blog</a></li>
  </ul>
  <a href="https://wa.me/31634319690?text=Hi%2C%20I%27d%20like%20to%20get%20started%20with%20LEADVOLVER" target="_blank" class="btn-dark">Get started →</a>
</nav>

<div class="hero">
  <div class="section-label">Blog</div>
  <h1>Insights on AI &amp;<br>Lead Generation</h1>
  <p>Strategies, tips, and updates from the LEADVOLVER team.</p>
</div>

<div class="posts">
  <div id="posts-container" class="empty"><p>Loading...</p></div>
</div>

<footer>&copy; 2026 LEADVOLVER &nbsp;&middot;&nbsp; <a href="/">Home</a></footer>

<script>
  const SUPABASE_URL = 'https://qyfkmsnjrytduxxssjsk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5Zmttc25qcnl0ZHV4eHNzanNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxOTM2NzEsImV4cCI6MjA5Mjc2OTY3MX0.sYmCbrWNAJEIjoU90lUDGzRGGfQUKyAHw93PZupHxM8';

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  async function loadPosts() {
    const container = document.getElementById('posts-container');
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/blogs?published=eq.true&order=created_at.desc&select=id,title,slug,excerpt,author,created_at`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );
      const posts = await res.json();
      if (!posts.length) {
        container.innerHTML = '<h3 style="font-family:\'Plus Jakarta Sans\',sans-serif">No posts yet</h3><p>Check back soon.</p>';
        return;
      }
      container.className = 'posts-grid';
      container.innerHTML = posts.map(p => `
        <a href="/blog/${p.slug}" class="post-card">
          <div class="post-meta">
            <span>${formatDate(p.created_at)}</span>
            <span class="post-meta-dot"></span>
            <span>${p.author}</span>
          </div>
          <h2>${p.title}</h2>
          ${p.excerpt ? `<p>${p.excerpt}</p>` : ''}
          <span class="post-read">Read post &rarr;</span>
        </a>
      `).join('');
    } catch (e) {
      container.innerHTML = '<h3>Failed to load posts</h3><p>Please try again later.</p>';
    }
  }
  loadPosts();
</script>
</body>
</html>
